<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: "MV Typer";
               src: url("../dhivehi_tools/web_static/fonts/mvtyper.ttf"); }
  * { margin: 0; box-sizing: border-box; }
  body { width: 1280px; height: 640px; overflow: hidden;
         font-family: "Segoe UI", sans-serif; color: #e6e9ef;
         background: radial-gradient(1100px 700px at 82% -10%, #1d4f8f 0%, #14223a 45%, #0c1117 100%); }
  .wrap { padding: 64px 80px; height: 100%; display: flex;
          flex-direction: column; }
  .th { font-family: "MV Typer", "MV Boli", sans-serif; }
  h1 { font-size: 92px; font-weight: normal; line-height: 1.25; }
  .sub { font-size: 30px; color: #9fb4d8; margin-top: 2px;
         direction: ltr; text-align: right; }
  .sample { margin-top: 44px; background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.12); border-radius: 18px;
            padding: 26px 34px; font-size: 40px; line-height: 1.9;
            width: fit-content; }
  .sample mark { color: inherit; border-radius: 6px; padding: 0 4px; }
  mark.e { background: rgba(255, 99, 92, .40); }
  mark.c { background: rgba(38, 198, 218, .38); }
  mark.g { background: rgba(255, 167, 38, .38); }
  .chips { margin-top: auto; display: flex; gap: 14px; flex-wrap: wrap;
           direction: ltr; }
  .chip { border: 1px solid rgba(255,255,255,.22); border-radius: 22px;
          padding: 10px 22px; font-size: 22px; color: #cdd9ec;
          background: rgba(255,255,255,.06); }
  .meta { position: absolute; bottom: 26px; left: 80px; direction: ltr;
          color: #7e8ba3; font-size: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <h1 class="th">ދިވެހި ޓޫލްސް</h1>
    <div class="sub">Dhivehi Tools — offline Thaana language suite</div>
  </div>
  <div class="sample th">
    އަހަރެން <mark class="e">ދިވެހ</mark> ބަސް ދަސްކުރަނީ
    <mark class="g">އެވެ</mark>. އެންމެ <mark class="c">ބޯޑު</mark> ދޯނި
  </div>
  <div class="chips">
    <span class="chip">✓ Spell check · 59k words</span>
    <span class="chip">✓ Grammar rules</span>
    <span class="chip">✓ Paraphrase</span>
    <span class="chip">✓ Radheef dictionary</span>
    <span class="chip">✓ Thaana ⇄ Latin</span>
    <span class="chip">✓ 100% offline</span>
  </div>
</div>
<div class="meta">github.com/siyamex/Dhivehi-Tools</div>
</body>
</html>
